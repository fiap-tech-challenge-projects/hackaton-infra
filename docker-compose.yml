services:
  # PostgreSQL for Upload Service
  postgres-upload:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: upload_service
      POSTGRES_USER: upload_user
      POSTGRES_PASSWORD: upload_pass
    ports: ["5432:5432"]
    volumes: ["postgres-upload-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upload_user -d upload_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for Report Service
  postgres-report:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: report_service
      POSTGRES_USER: report_user
      POSTGRES_PASSWORD: report_pass
    ports: ["5433:5432"]
    volumes: ["postgres-report-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report_user -d report_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  # DynamoDB Local for Processing Service (DocumentDB/MongoDB NOT available on AWS Free Tier)
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: "-jar DynamoDBLocal.jar -sharedDb"
    ports: ["8000:8000"]
    volumes: ["dynamodb-data:/home/dynamodblocal/data"]

  # DynamoDB table init
  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on: ["dynamodb-local"]
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ""
    command: >-
      sh -c "sleep 3 && aws dynamodb create-table --table-name hackaton-analysis-results-development --attribute-definitions AttributeName=analysisId,AttributeType=S AttributeName=createdAt,AttributeType=S --key-schema AttributeName=analysisId,KeyType=HASH AttributeName=createdAt,KeyType=RANGE --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 2>/dev/null || echo Table_already_exists"

  # RabbitMQ for async messaging between services
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: rabbit
    volumes: ["rabbitmq-data:/var/lib/rabbitmq"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible) for file storage
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO bucket init
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c
    command: >
      "mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/diagrams --ignore-existing &&
      echo 'Bucket diagrams created'"

volumes:
  postgres-upload-data:
  postgres-report-data:
  dynamodb-data:
  rabbitmq-data:
  minio-data:
